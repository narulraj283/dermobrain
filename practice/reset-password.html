<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - DermoBrain</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #028090;
            --dark: #015f6b;
            --light-bg: #f5f5f5;
            --border-color: #e0e0e0;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --success-color: #4caf50;
            --error-color: #f44336;
            --input-bg: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--dark) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
        }

        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            padding: 40px 30px;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .logo-subtitle {
            font-size: 12px;
            color: var(--text-secondary);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        h1 {
            font-size: 24px;
            color: var(--text-primary);
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            background: var(--input-bg);
            color: var(--text-primary);
            transition: border-color 0.3s ease;
        }

        input[type="password"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(2, 128, 144, 0.1);
        }

        input[type="password"]::placeholder {
            color: var(--text-secondary);
        }

        .password-requirements {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 6px;
        }

        .message {
            padding: 12px 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .message.success {
            display: block;
            background: rgba(76, 175, 80, 0.1);
            color: var(--success-color);
            border: 1px solid var(--success-color);
        }

        .message.error {
            display: block;
            background: rgba(244, 67, 54, 0.1);
            color: var(--error-color);
            border: 1px solid var(--error-color);
        }

        .message.warning {
            display: block;
            background: rgba(244, 67, 54, 0.1);
            color: var(--error-color);
            border: 1px solid var(--error-color);
        }

        button {
            width: 100%;
            padding: 12px 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            margin-top: 10px;
        }

        button:hover:not(:disabled) {
            background: var(--dark);
            transform: translateY(-2px);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
        }

        .login-link a {
            color: var(--primary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .login-link a:hover {
            color: var(--dark);
            text-decoration: underline;
        }

        .form-wrapper {
            display: none;
        }

        .form-wrapper.active {
            display: block;
        }

        .loader {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loader.active {
            display: block;
        }

        .spinner {
            border: 3px solid var(--light-bg);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .card {
                padding: 30px 20px;
            }

            h1 {
                font-size: 20px;
            }

            .logo {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo-section">
                <div class="logo">DermoBrain</div>
                <div class="logo-subtitle">Medical Platform</div>
            </div>

            <h1>Reset Password</h1>
            <p class="subtitle">Create a new password for your account</p>

            <div class="loader" id="loader">
                <div class="spinner"></div>
            </div>

            <div class="form-wrapper active" id="formWrapper">
                <div class="message warning" id="invalidTokenMessage">
                    Invalid or expired reset token. Please request a new password reset link.
                </div>

                <form id="resetForm">
                    <div class="form-group">
                        <label for="newPassword">New Password</label>
                        <input
                            type="password"
                            id="newPassword"
                            name="newPassword"
                            placeholder="Enter new password"
                            required
                        >
                        <div class="password-requirements">
                            Minimum 6 characters
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input
                            type="password"
                            id="confirmPassword"
                            name="confirmPassword"
                            placeholder="Confirm password"
                            required
                        >
                    </div>

                    <div class="message error" id="errorMessage"></div>

                    <button type="submit" id="submitBtn">Reset Password</button>
                </form>
            </div>

            <div class="message success" id="successMessage">
                <strong>Password reset successfully!</strong> Your password has been updated. You can now log in with your new password.
                <div class="login-link" style="margin-top: 15px;">
                    <a href="portal.html">Go to Login</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://dermobrain-api.naren-6e3.workers.dev';

        const resetForm = document.getElementById('resetForm');
        const newPasswordInput = document.getElementById('newPassword');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const submitBtn = document.getElementById('submitBtn');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const invalidTokenMessage = document.getElementById('invalidTokenMessage');
        const formWrapper = document.getElementById('formWrapper');
        const loader = document.getElementById('loader');

        // Get token from URL params
        function getTokenFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('token');
        }

        // Validate form on load
        function validateTokenOnLoad() {
            const token = getTokenFromURL();
            if (!token) {
                invalidTokenMessage.style.display = 'block';
                resetForm.style.display = 'none';
                submitBtn.style.display = 'none';
            }
        }

        // Validate passwords match and meet requirements
        function validatePasswords() {
            const newPassword = newPasswordInput.value.trim();
            const confirmPassword = confirmPasswordInput.value.trim();

            if (newPassword.length < 6) {
                errorMessage.textContent = 'Password must be at least 6 characters long.';
                errorMessage.style.display = 'block';
                return false;
            }

            if (newPassword !== confirmPassword) {
                errorMessage.textContent = 'Passwords do not match. Please try again.';
                errorMessage.style.display = 'block';
                return false;
            }

            errorMessage.style.display = 'none';
            return true;
        }

        // Handle form submission
        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!validatePasswords()) {
                return;
            }

            const token = getTokenFromURL();
            const newPassword = newPasswordInput.value.trim();

            // Show loader
            loader.classList.add('active');
            formWrapper.classList.remove('active');
            submitBtn.disabled = true;

            try {
                const response = await fetch(`${API_BASE}/api/auth/reset-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        token,
                        new_password: newPassword,
                    }),
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Show success message
                    formWrapper.classList.remove('active');
                    successMessage.style.display = 'block';
                } else {
                    // Show error
                    throw new Error(data.message || 'Failed to reset password');
                }
            } catch (error) {
                loader.classList.remove('active');
                formWrapper.classList.add('active');
                submitBtn.disabled = false;

                if (error.message.includes('invalid') || error.message.includes('expired')) {
                    invalidTokenMessage.style.display = 'block';
                    resetForm.style.display = 'none';
                } else {
                    errorMessage.textContent = error.message || 'An error occurred. Please try again.';
                    errorMessage.style.display = 'block';
                }
            }
        });

        // Clear error message on input
        newPasswordInput.addEventListener('input', () => {
            errorMessage.style.display = 'none';
        });

        confirmPasswordInput.addEventListener('input', () => {
            errorMessage.style.display = 'none';
        });

        // Validate token on page load
        validateTokenOnLoad();
    </script>
</body>
</html>
